    <script>
      (function applyRedirectParam() {
        const params = new URLSearchParams(window.location.search);
        const redirect = params.get('redirect');
        if (redirect) {
          const target = decodeURIComponent(redirect);
          window.history.replaceState(null, '', target);
        }
      })();
